<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEISMS | Ward Intelligence System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-container">
  <aside class="sidebar">[Same sidebar]</aside>
  <main class="main-content">
    <div class="top-bar"><div class="page-title"><h2>Ward Intelligence System</h2><p>Section 6.3 – 168 Political Wards · Grassroots intelligence coordination</p></div></div>
    
    <div class="stats-row">
      <div class="stat-card"><div class="value">168</div><div class="label">Total Wards</div></div>
      <div class="stat-card"><div class="value" id="active-wards">0</div><div class="label">Active Reporting</div></div>
      <div class="stat-card"><div class="value" id="avg-ward-score">0%</div><div class="label">Avg Mobilisation</div></div>
    </div>
    
    <div class="card-panel"><h3><i class="fas fa-search"></i> Ward Directory</h3><input type="text" id="ward-search" placeholder="Search by ward name, LGA, or coordinator..." style="width:100%; padding:12px; margin-bottom:20px; background:#1a1e2f; border:1px solid #2d3348; border-radius:10px;"><div id="ward-list" class="ward-list"></div></div>
  </main>
</div>
<script src="data.js"></script>
<script>
  document.getElementById('active-wards').innerText = wards.filter(w=>w.status!=='critical').length;
  document.getElementById('avg-ward-score').innerText = Math.floor(wards.reduce((s,w)=>s+w.mobilisationScore,0)/wards.length)+'%';
  
  function renderWards(filter=''){
    let filtered = wards.filter(w=>w.name.toLowerCase().includes(filter)||w.lga.toLowerCase().includes(filter)||(w.coordinator&&w.coordinator.toLowerCase().includes(filter)));
    document.getElementById('ward-list').innerHTML = filtered.map(w=>`<div class="ward-item"><div><strong>${w.name}</strong><br><small>${w.lga} | Coordinator: ${w.coordinator || 'TBD'}</small></div><div><span class="badge ${w.mobilisationScore>=70?'badge-success':(w.mobilisationScore>=50?'badge-warning':'badge-danger')}">${w.mobilisationScore}%</span><br><small>${w.pollingUnits || 0} PUs</small></div></div>`).join('');
  }
  renderWards();
  document.getElementById('ward-search').addEventListener('input', e=>renderWards(e.target.value.toLowerCase()));
</script>
</body>
</html>
