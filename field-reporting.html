<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEISMS | Field Reporting Module</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-container">
  <aside class="sidebar">[Same sidebar navigation]</aside>
  <main class="main-content">
    <div class="top-bar"><div class="page-title"><h2>Field Reporting Module</h2><p>Section 6.5 – Mobile-enabled real-time intelligence reporting</p></div></div>
    
    <div class="grid-2">
      <div class="card-panel">
        <h3><i class="fas fa-edit"></i> Submit Field Intelligence Report</h3>
        <form id="field-report-form" class="report-form">
          <div class="form-group"><label><i class="fas fa-user"></i> Reporting Officer *</label><input type="text" id="officer-name" placeholder="Full name / Agent ID" required></div>
          <div class="form-group"><label><i class="fas fa-map-marker-alt"></i> LGA *</label><select id="report-lga"><option>Jalingo</option><option>Bali</option><option>Gassol</option><option>Wukari</option><option>Ibi</option><option>Takum</option><option>Donga</option><option>Kurmi</option><option>Sardauna</option><option>Zing</option><option>Lau</option><option>Ardo Kola</option><option>Karim Lamido</option><option>Yorro</option><option>Gashaka</option><option>Ussa</option></select></div>
          <div class="form-group"><label><i class="fas fa-layer-group"></i> Ward</label><input type="text" id="report-ward" placeholder="Ward name" required></div>
          <div class="form-group"><label><i class="fas fa-flag-checkered"></i> Polling Unit (Optional)</label><input type="text" id="report-pu" placeholder="Polling unit code/name"></div>
          <div class="form-group"><label><i class="fas fa-tag"></i> Intelligence Category</label><select id="report-category"><option>Political Sentiment</option><option>Mobilisation Update</option><option>Incident/Emergency</option><option>Governance Feedback</option><option>Opposition Activity</option><option>Voter Registration</option><option>Security Situation</option></select></div>
          <div class="form-group"><label><i class="fas fa-file-alt"></i> Detailed Report *</label><textarea id="report-details" rows="4" placeholder="Describe the situation, sentiment, or incident with specific details..."></textarea></div>
          <div class="form-group"><label><i class="fas fa-camera"></i> Attach Media (URL or description)</label><input type="text" id="report-media" placeholder="Image/Video reference"></div>
          <div class="form-group"><label><i class="fas fa-exclamation-triangle"></i> Priority Level</label><select id="report-priority"><option>Normal</option><option>High</option><option>Critical - Immediate Action</option></select></div>
          <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> Submit Intelligence Report</button>
        </form>
      </div>
      
      <div class="card-panel">
        <h3><i class="fas fa-history"></i> Recent Field Submissions</h3>
        <div id="submission-history" class="feeds-container"></div>
        <div class="stats-row" style="margin-top: 16px;">
          <div class="stat-card"><div class="label">Today's Reports</div><div class="value" id="today-reports">0</div></div>
          <div class="stat-card"><div class="label">Pending Review</div><div class="value" id="pending-reports">0</div></div>
        </div>
      </div>
    </div>

    <div class="card-panel">
      <h3><i class="fas fa-chart-line"></i> Reporting Performance by LGA</h3>
      <canvas id="reportingChart" height="150"></canvas>
    </div>
  </main>
</div>
<script src="data.js"></script>
<script>
  let fieldSubmissions = JSON.parse(localStorage.getItem('teisms_reports') || '[]');
  
  function renderSubmissions() {
    const container = document.getElementById('submission-history');
    if(container) {
      container.innerHTML = fieldSubmissions.slice().reverse().slice(0,10).map(s => `
        <div class="feed-item"><i class="fas fa-file-alt"></i><div><strong>${s.officer}</strong> (${s.lga}/${s.ward})<br>${s.category}: ${s.details.substring(0,100)}...<br><small>${new Date(s.timestamp).toLocaleString()} | Priority: ${s.priority}</small></div></div>
      `).join('') || '<p>No submissions yet</p>';
    }
    document.getElementById('today-reports').innerText = fieldSubmissions.filter(s => new Date(s.timestamp).toDateString() === new Date().toDateString()).length;
  }
  
  document.getElementById('field-report-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const report = {
      id: Date.now(),
      officer: document.getElementById('officer-name').value,
      lga: document.getElementById('report-lga').value,
      ward: document.getElementById('report-ward').value,
      pollingUnit: document.getElementById('report-pu').value,
      category: document.getElementById('report-category').value,
      details: document.getElementById('report-details').value,
      media: document.getElementById('report-media').value,
      priority: document.getElementById('report-priority').value,
      timestamp: new Date().toISOString(),
      status: 'pending'
    };
    fieldSubmissions.unshift(report);
    localStorage.setItem('teisms_reports', JSON.stringify(fieldSubmissions));
    renderSubmissions();
    showToast('Intelligence report submitted successfully!');
    this.reset();
  });
  
  renderSubmissions();
  
  new Chart(document.getElementById('reportingChart'), {
    type: 'bar',
    data: { labels: lgas.slice(0,8).map(l=>l.name), datasets: [{ label: 'Reports (Last 7 days)', data: lgas.slice(0,8).map(()=>Math.floor(Math.random()*50)+20), backgroundColor: '#d4a13e' }] }
  });
</script>
</body>
</html>
